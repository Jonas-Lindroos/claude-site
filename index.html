<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Claude is awesome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 72px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(48px, 10vw, 170px);
      font-weight: 700;
      color: #1f1f1f;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .ghost-btn {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #000;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 16px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 0px;
      border-radius: 12px;
      transform: translateY(0);
      transition: transform 200ms ease, gap 200ms ease, background 200ms ease;
    }

    .ghost-btn:hover {
      transform: translateY(-6px);
      gap: 8px;
      background: #e0e0dd;
    }

    .ghost-btn .arrow {
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      width: 0;
      opacity: 0;
      transition: width 200ms ease, opacity 200ms ease;
    }

    .ghost-btn:hover .arrow {
      width: 18px;
      opacity: 1;
    }

    .ghost-btn .arrow svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="center">
    <h1>Claude is awesome</h1>
    <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;">
      <button class="ghost-btn" onclick="window.location.href='about.html'">
        What do you mean?
        <span class="arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="2" y1="8" x2="14" y2="8" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
            <polyline points="9,3.5 14,8 9,12.5" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
      <button class="ghost-btn" onclick="window.location.href='tasks.html'">
        Tasks
        <span class="arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="2" y1="8" x2="14" y2="8" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
            <polyline points="9,3.5 14,8 9,12.5" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
    </div>
  </div>
</body>
</html>
